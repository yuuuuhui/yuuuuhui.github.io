<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千万别点</title>
    <style>
        body {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #click-text {
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        iframe {
            margin-top: 30px;
            width: 700px;
            height: 400px;
            display: none;
            border: none;
        }
    </style>
</head>
<body>
    <div id="click-text">千万不要点</div>
    <!-- B站Rickroll视频嵌入 -->
    <iframe id="rick-video" src="https://player.bilibili.com/player.html?aid=1732755" allowfullscreen></iframe>

    <script>
        const text = document.getElementById('click-text');
        const iframe = document.getElementById('rick-video');
        text.onclick = () => {
            iframe.style.display = 'block';
        }
    </script>
</body>
</html>
