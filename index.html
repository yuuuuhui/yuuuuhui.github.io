<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千万别点</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        #click-text {
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 40px;
            transition: opacity 0.5s;
        }
        #rick-video {
            width: 720px;
            max-width: 90vw;
            display: none;
            /* 旋转动画 */
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="click-text">千万不要点</div>
    <video id="rick-video" controls>
        <source src="rickroll.mp4" type="video/mp4">
        浏览器不支持视频播放
    </video>

    <script>
        const text = document.getElementById('click-text');
        const video = document.getElementById('rick-video');

        text.onclick = () => {
            // 文字消失
            text.style.opacity = '0';
            setTimeout(() => text.style.display = 'none', 500);

            // 显示视频、播放、调大音量
            video.style.display = 'block';
            video.volume = 1; // 最大音量
            video.play();
        }
    </script>
</body>
</html>
